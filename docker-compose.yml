services:
  postgres:
    image: postgres:17
    container_name: employee_ai_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - employee_ai_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: employee_ai_backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      GIT_PYTHON_REFRESH: quiet
    volumes:
      - ./backend:/app
      - ./backend/mlruns:/app/mlruns

  frontend:
    build: ./frontend
    container_name: employee_ai_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mlflow:
    build:
      context: ./backend
      dockerfile: Dockerfile.mlflow
    container_name: employee_ai_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

volumes:
  employee_ai_data: