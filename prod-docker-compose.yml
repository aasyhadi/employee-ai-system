services:

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: employee_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend

    env_file:
      - .env

    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - frontend
      - backend

  mlflow:
    build:
      context: ./backend
      dockerfile: Dockerfile.mlflow

    ports:
      - "5000:5000"

volumes:
  postgres_data: